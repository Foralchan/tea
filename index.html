<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>茶叶工具箱</title>
<style>
:root{--bg:#f7f5ef;--paper:#fffdf8;--ink:#2b322b;--muted:#697169;--green:#46644c;--line:#e3ddd1;--radius:20px;--shadow:0 18px 45px rgba(49,55,43,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}a{color:inherit;text-decoration:none}.shell{max-width:1240px;margin:auto;padding:0 22px 42px}.top{min-height:78px;display:flex;align-items:center;gap:24px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px;font-weight:750;white-space:nowrap}.mark{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:var(--green);color:#f5e8c5;font-size:19px}.tabs{display:flex;gap:5px;margin-left:auto;overflow:auto}.tabs a{padding:9px 12px;border-radius:10px;color:var(--muted);font-size:14px;white-space:nowrap}.tabs a:hover,.tabs a.active{background:#e8eee6;color:#2f4937;font-weight:700}main{padding-top:42px}.hero{max-width:760px;margin:0 auto 30px;text-align:center}.eyebrow{display:inline-block;padding:6px 10px;border-radius:999px;background:#eff4ed;color:var(--green);font-size:12px;font-weight:700}.hero h1{font-size:clamp(30px,5vw,48px);line-height:1.16;letter-spacing:-.035em;margin:18px 0 13px}.hero p{margin:0;color:var(--muted);line-height:1.75}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:34px}.card{position:relative;min-height:240px;padding:23px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);overflow:hidden;transition:.18s}.card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:#cfdbc9}.card:after{content:"";position:absolute;width:135px;height:135px;right:-45px;bottom:-54px;border-radius:50%;background:var(--tint)}.card img{width:52px;height:52px;border-radius:16px;padding:8px;background:var(--tint);position:relative;z-index:1}.card h2{font-size:19px;margin:22px 0 8px;position:relative;z-index:1}.card p{color:var(--muted);font-size:14px;line-height:1.65;position:relative;z-index:1}.enter{position:absolute;bottom:22px;color:#2f4937;font-weight:700;font-size:14px;z-index:1}.viewer-head{display:flex;gap:12px;align-items:center;margin-bottom:16px}.back{border:0;background:none;color:var(--muted);font:inherit;cursor:pointer;padding:8px 0}.viewer-title{font-weight:750;font-size:18px;margin-right:auto}.open{padding:8px 11px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-size:13px;color:var(--muted)}.frame{overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}iframe{display:block;width:100%;height:calc(100vh - 158px);min-height:720px;border:0}footer{text-align:center;color:#97968c;font-size:12px;padding-top:36px}[hidden]{display:none!important}@media(max-width:760px){.shell{padding:0 15px 28px}.top{min-height:68px;gap:8px}.brand{font-size:14px}.tabs{gap:1px}.tabs a{padding:8px 9px;font-size:13px}main{padding-top:30px}.grid{grid-template-columns:1fr;gap:12px;margin-top:25px}.card{min-height:185px;padding:19px}.card h2{margin-top:15px}.viewer-title{font-size:16px}iframe{height:calc(100vh - 132px);min-height:620px}}
</style>
</head>
<body>
<div class="shell">
<header class="top">
  <a class="brand" href="#home"><span class="mark">🍃</span><span>茶叶工具箱</span></a>
  <nav class="tabs" id="tabs" aria-label="茶叶工具"></nav>
</header>
<main>
<section id="home">
  <div class="hero"><span class="eyebrow">PERSONAL TEA WORKSPACE</span><h1>把喝茶的日常，整理得更顺手。</h1><p>价格、办公室冲泡、凤凰单丛筛选，都在这里。选择一个工具开始。</p></div>
  <div class="grid" id="grid"></div>
</section>
<section id="viewer" hidden>
  <div class="viewer-head"><button class="back" id="back" type="button">← 工具箱</button><span class="viewer-title" id="viewer-title"></span><a class="open" id="open" target="_blank" rel="noopener">单独打开 ↗</a></div>
  <div class="frame" id="frame"></div>
</section>
</main>
<footer>Tea Workspace · 持续更新中</footer>
</div>
<script>
const tools=[
 {id:"price",title:"茶叶价格总库",desc:"查询、筛选与比较茶叶价格信息。",file:"price.html",icon:"price-icon.svg",tint:"#edf3e8"},
 {id:"office",title:"办公室泡茶速查",desc:"按杯量快速查看办公室冲泡参数。",file:"office.html",icon:"office-icon.svg",tint:"#e6f1f4"},
 {id:"phoenix",title:"凤凰单丛筛选器",desc:"按香型与偏好筛选凤凰单丛。",file:"phoenix.html",icon:"phoenix-icon.svg",tint:"#f5ece3"},
 {id:"foundations",title:"茶叶三联感官图谱",desc:"用三张交互图谱理解感官词、芳香分子与茶汤感受。",file:"foundations/",icon:"sensory-icon.svg",tint:"#e8f0e8",external:true},
 {id:"chemistry",title:"茶叶内含物质图谱",desc:"从干茶构成、感知物质与加工变化，理解一杯茶的化学路径。",file:"chemistry/",icon:"chemistry-icon.svg",tint:"#edf1e7",external:true}
];
const tabs=document.querySelector("#tabs"),grid=document.querySelector("#grid"),home=document.querySelector("#home"),viewer=document.querySelector("#viewer"),frame=document.querySelector("#frame"),title=document.querySelector("#viewer-title"),open=document.querySelector("#open");
function render(){
 const active=tools.find(x=>x.id===location.hash.slice(1));
 tabs.innerHTML=tools.map(x=>`<a class="${active&&x.id===active.id?"active":""}" href="${x.external?x.file:"#"+x.id}" target="${x.external?"_blank":"_self"}">${x.title}</a>`).join("");
 grid.innerHTML=tools.map(x=>`<a class="card" href="${x.external?x.file:"#"+x.id}" target="${x.external?"_blank":"_self"}" style="--tint:${x.tint}"><img src="${x.icon}" alt=""><h2>${x.title}</h2><p>${x.desc}</p><span class="enter">打开工具 →</span></a>`).join("");
 home.hidden=!!active;viewer.hidden=!active;
 if(!active){frame.innerHTML="";document.title="茶叶工具箱";return}
 title.textContent=active.title;open.href=active.file;frame.innerHTML=`<iframe src="${active.file}" title="${active.title}"></iframe>`;document.title=active.title+" · 茶叶工具箱";
}
document.querySelector("#back").onclick=()=>location.hash="home";window.onhashchange=render;render();
</script>
</body>
</html>
