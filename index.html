<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="price-icon.svg">
<title>茶叶价格总库 · 互动版</title>
<style>
  :root{
    --bg:#faf8f4; --card:#fff; --ink:#2b2b28; --muted:#8a857c; --line:#e7e2d8;
    --kou:#8fb98a; --jin:#e0a94b; --jing:#c76b4a; --over:#b23b3b; --star:#e0a94b;
    --chip:#f0ece3;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .wrap{max-width:1040px;margin:0 auto;padding:22px 16px 60px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .sub b{color:var(--jing)}
  .controls{position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:5;border-bottom:1px solid var(--line);margin-bottom:14px}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
  input[type=search],input[type=number]{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff;color:var(--ink)}
  input[type=search]{flex:1;min-width:160px}
  input[type=number]{width:92px}
  .chip{padding:5px 11px;border-radius:20px;background:var(--chip);border:1px solid transparent;font-size:13px;cursor:pointer;user-select:none;color:#5c574d}
  .chip.on{background:var(--ink);color:#fff}
  .chip.you{background:#fff;border-color:var(--star);color:#b5872f}
  .chip.you.on{background:var(--star);color:#fff;border-color:var(--star)}
  .hint{font-size:12px;color:var(--muted)}
  .count{font-size:12px;color:var(--muted);margin:2px 0 12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
  .card:hover{box-shadow:0 3px 14px rgba(0,0,0,.05)}
  .head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer}
  .cat{font-size:11px;color:#fff;padding:2px 8px;border-radius:6px;white-space:nowrap;background:#b7a98c}
  .nm{font-weight:600;font-size:15px}
  .star{color:var(--star);font-size:14px}
  .desc{color:var(--muted);font-size:12px;font-weight:400}
  .badge{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap}
  .badge b{color:var(--ink);font-size:14px}
  .arrow{color:var(--muted);transition:transform .2s;font-size:12px}
  .card.open .arrow{transform:rotate(90deg)}
  .body{display:none;padding:2px 15px 15px;border-top:1px dashed var(--line)}
  .card.open .body{display:block}
  .prow{display:grid;grid-template-columns:130px 1fr 92px;gap:10px;align-items:center;margin:9px 0}
  .plabel{font-size:12.5px;color:#5c574d}
  .tier{font-size:10px;padding:1px 6px;border-radius:5px;color:#fff;margin-left:5px;vertical-align:middle}
  .t-kou{background:var(--kou)} .t-jin{background:var(--jin)} .t-jing{background:var(--jing)} .t-over{background:var(--over)}
  .track{background:#f1ede4;border-radius:6px;height:15px;position:relative;overflow:hidden}
  .fill{position:absolute;top:0;bottom:0;border-radius:6px;opacity:.9}
  .f-kou{background:var(--kou)} .f-jin{background:var(--jin)} .f-jing{background:var(--jing)}
  .overtag{font-size:11px;color:var(--over);font-weight:600;padding:0 6px}
  .pval{font-size:12.5px;text-align:right;color:#3a3a35;font-variant-numeric:tabular-nums}
  .avoid{margin-top:10px;background:#fbf0ee;border:1px solid #f0d5cf;border-radius:9px;padding:9px 11px;font-size:12.5px;color:#8a3b30}
  .avoid b{color:var(--over)}
  .note{margin-top:8px;font-size:12px;color:var(--muted)}
  .legend{font-size:11.5px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:middle}
  footer{margin-top:26px;font-size:11.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:12px}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  @media (max-width:480px){
    .wrap{padding:16px 11px 50px}
    h1{font-size:19px}
    .controls{padding:10px 0}
    input[type=search]{min-width:120px}
    .head{padding:11px 12px;gap:7px}
    .nm{font-size:14px}
    .desc{display:block;margin-top:1px;font-size:11.5px}
    .badge{font-size:11px}
    .prow{grid-template-columns:82px 1fr 54px;gap:6px;margin:8px 0}
    .plabel{font-size:11px}
    .pval{font-size:11px}
    .cat{font-size:10px;padding:2px 6px}
    .tier{font-size:9px;padding:1px 4px}
  }
</style>
</head>

</div>

  {l:'品牌明前一级',t:J,lo:17,hi:55},{l:'核心产区明前',t:P,lo:60,hi:185}],
  avoid:'"龙井"≠"西湖龙井"。核心产区明前一级官方380–410/50g；远低于此价的"核心西湖龙井"要警惕。'},
{cat:'绿茶',name:'黄山毛峰',you:1,desc:'鲜爽回甘、性价比高',rows:[
  {l:'口粮',t:K,lo:5,hi:30},{l:'进阶',t:J,lo:30,hi:70},{l:'精品',t:P,lo:70,hi:100}]},
{cat:'绿茶',name:'大佛/钱塘龙井',desc:'龙井平替、便宜',rows:[
  {l:'口粮',t:K,lo:20,hi:58},{l:'进阶',t:J,lo:58,hi:138}]},
{cat:'绿茶',name:'洞庭碧螺春',desc:'认东山茶厂"碧螺"牌',rows:[
  {l:'口粮',t:K,lo:15,hi:40},{l:'进阶',t:J,lo:40,hi:80},{l:'精品',t:P,lo:80,hi:200}],
  avoid:'便宜"洞庭碧螺春"多为日照/四川碧螺春冒充；核心明前官方350–750/50g。'},
{cat:'绿茶',name:'信阳毛尖',desc:'绿茶之王',rows:[
  {l:'口粮(雨前)',t:K,lo:8,hi:35},{l:'进阶',t:J,lo:35,hi:80},{l:'精品(明前)',t:P,lo:80,hi:150}]},
{cat:'绿茶',name:'太平猴魁',desc:'无明前茶（标"明前猴魁"即忽悠）',rows:[
  {l:'口粮',t:K,lo:20,hi:50},{l:'进阶',t:J,lo:50,hi:100},{l:'精品',t:P,lo:100,hi:300}]},
{cat:'绿茶',name:'六安瓜片',desc:'无芽无梗单叶',rows:[
  {l:'口粮',t:K,lo:10,hi:40},{l:'进阶',t:J,lo:40,hi:100},{l:'精品',t:P,lo:100,hi:200}]},
];

const CAT_COLORS={'岩茶':'#8a6d3b','台湾乌龙':'#4f8a6d','凤凰单丛':'#7a5c9e','铁观音·闽南':'#c0894a','普洱':'#9e5a3a','红茶':'#b1503f','白茶':'#7f9bb0','绿茶':'#6f9b4e'};
const TIER_CLASS={[K]:'kou',[J]:'jin',[P]:'jing',[O]:'over'};
const cats=[...new Set(DATA.map(d=>d.cat))];
let activeCats=new Set(cats), onlyYou=false;

const catsEl=document.getElementById('cats');
const allChip=mk('全部',true);allChip.onclick=()=>{activeCats=new Set(cats);[...catsEl.children].forEach((c,i)=>{if(i===0)c.classList.add('on');else c.classList.add('on')});render()};
catsEl.appendChild(allChip);
cats.forEach(c=>{const ch=mk(c,true);ch.style.setProperty('--x',CAT_COLORS[c]);ch.onclick=()=>{ch.classList.toggle('on');if(ch.classList.contains('on'))activeCats.add(c);else activeCats.delete(c);allChip.classList.toggle('on',activeCats.size===cats.length);render()};catsEl.appendChild(ch)});
function mk(t,on){const s=document.createElement('span');s.className='chip'+(on?' on':'');s.textContent=t;return s}

const youBtn=document.getElementById('youBtn');
youBtn.onclick=()=>{onlyYou=!onlyYou;youBtn.classList.toggle('on',onlyYou);render()};
document.getElementById('q').oninput=render;
document.getElementById('pmax').oninput=render;

function cheapest(d){return Math.min(...d.rows.filter(r=>r.t!==O).map(r=>r.lo).concat([Infinity]))}
function render(){
  const q=document.getElementById('q').value.trim();
  const pm=parseFloat(document.getElementById('pmax').value);
  const list=document.getElementById('list');list.innerHTML='';
  let n=0;
  DATA.forEach(d=>{
    if(!activeCats.has(d.cat))return;
    if(onlyYou&&!d.you)return;
    if(q&&!(d.name.includes(q)||d.desc.includes(q)||d.cat.includes(q)))return;
    if(!isNaN(pm)){const c=cheapest(d);if(!(c<=pm))return;}
    n++;
    list.appendChild(cardEl(d));
  });
  document.getElementById('count').textContent=`共 ${n} 项（点标题展开各档价位）`;
  if(n===0)list.innerHTML='<div class="empty">没有匹配的茶 · 放宽筛选试试</div>';
}
function cardEl(d){
  const card=document.createElement('div');card.className='card';
  const c=cheapest(d);
  const badge=isFinite(c)?`最低 <b>${c}</b> 元/50g起`:'<b>天价名号</b>';
  const head=document.createElement('div');head.className='head';
  head.innerHTML=`<span class="cat" style="background:${CAT_COLORS[d.cat]}">${d.cat}</span>
    <span class="nm">${d.name} ${d.you?'<span class="star">★</span>':''} <span class="desc">${d.desc}</span></span>
    <span class="badge">${badge}</span><span class="arrow">▶</span>`;
  head.onclick=()=>card.classList.toggle('open');
  const body=document.createElement('div');body.className='body';
  const SCALE=250;
  d.rows.forEach(r=>{
    const cls=TIER_CLASS[r.t];
    let mid='';
    if(r.t===O){mid=`<div class="track"><span class="overtag">真货≈${r.lo}${r.hi>r.lo?'–'+r.hi:''} 元/50g · 超预算</span></div>`;}
    else{const w=Math.min(100,Math.max(3,(r.hi/SCALE)*100));const x=Math.min(100,(r.lo/SCALE)*100);
      mid=`<div class="track"><span class="fill f-${cls}" style="left:${x}%;width:${Math.max(4,w-x)}%"></span></div>`;}
    const pv=r.t===O?'—':`${r.lo}–${r.hi}`;
    body.innerHTML+=`<div class="prow"><div class="plabel">${r.l}<span class="tier t-${cls}">${r.t}</span></div>${mid}<div class="pval">${pv}</div></div>`;
  });
  if(d.avoid)body.innerHTML+=`<div class="avoid"><b>⚠ 避坑/降级真相：</b>${d.avoid}</div>`;
  card.appendChild(head);card.appendChild(body);
  return card;
}
render();
</script>
